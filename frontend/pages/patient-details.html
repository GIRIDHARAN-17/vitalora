<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Vitals | Vitalora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .details-container {
            max-width: 1400px;
            margin: 8rem auto 4rem;
            padding: 0 5%;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1rem;
            height: 300px;
        }

        .vitals-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
        }

        .vital-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            transition: var(--transition);
            flex: 1 1 220px;
            max-width: 300px;
        }

        .vital-box:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .vital-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .vital-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .vital-unit {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .timestamp-display {
            font-family: monospace;
            color: var(--primary);
            font-size: 1.1rem;
            margin-top: 2rem;
            text-align: center;
        }

        .critical-value {
            color: #ff0055 !important;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="../index.html" class="brand">Vitalora</a>
        <ul class="nav-links">
            <li><a href="dashboard.html" class="nav-link">Back to Dashboard</a></li>
        </ul>
    </nav>

    <div class="details-container">
        <div class="header-row">
            <div>
                <h1 id="p-name">Loading...</h1>
                <p id="p-id" style="color: var(--primary);">ID: ...</p>
            </div>
            <button id="export-btn" class="btn-cta">Export CSV (Live)</button>
        </div>

        <!-- Top Half: NEWS Score Chart -->
        <h2 class="section-title" style="font-size: 1.5rem; text-align: left; margin-bottom: 1.5rem;">Real-time NEWS
            Score Trend</h2>
        <div class="charts-grid" style="grid-template-columns: 1fr;">
            <div class="chart-card">
                <canvas id="newsChart"></canvas>
            </div>
        </div>

        <!-- Bottom Half: Grid values -->
        <h2 class="section-title" style="font-size: 1.5rem; text-align: left; margin-bottom: 1.5rem;">Live Vitals
            Monitor</h2>
        <div class="vitals-grid">
            <div class="vital-box">
                <span class="vital-label">Heart Rate</span>
                <div class="vital-value" id="val-hr">--</div>
                <span class="vital-unit">bpm</span>
            </div>
            <div class="vital-box">
                <span class="vital-label">SpO2</span>
                <div class="vital-value" id="val-spo2">--</div>
                <span class="vital-unit">%</span>
            </div>
            <div class="vital-box">
                <span class="vital-label">Blood Pressure</span>
                <div class="vital-value" id="val-bp">--/--</div>
                <span class="vital-unit">mmHg</span>
            </div>
            <div class="vital-box">
                <span class="vital-label">Respiration Rate</span>
                <div class="vital-value" id="val-resp">--</div>
                <span class="vital-unit">bpm</span>
            </div>
            <div class="vital-box">
                <span class="vital-label">Temperature</span>
                <div class="vital-value" id="val-temp">--</div>
                <span class="vital-unit">°C</span>
            </div>
            <div class="vital-box">
                <span class="vital-label">Oxygen Support</span>
                <div class="vital-value" id="val-win">--</div>
                <span class="vital-unit">L/min</span>
            </div>
            <div class="vital-box">
                <span class="vital-label">Consciousness</span>
                <div class="vital-value" id="val-gcs" style="font-size: 1.4rem;">--</div>
            </div>
            <div class="vital-box" style="border-color: var(--secondary); background: rgba(112, 0, 255, 0.05);">
                <span class="vital-label">NEWS Score</span>
                <div class="vital-value" id="val-news" style="color: var(--secondary);">--</div>
                <span class="vital-unit">Risk Level</span>
            </div>
        </div>

        <div class="timestamp-display" id="live-time">
            Live Sync: --:--:--
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/patient-details.js"></script>
</body>

</html>
